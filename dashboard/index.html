<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RalphTerm Dashboard</title>
    <link rel="stylesheet" href="/dashboard/styles.css" />
  </head>
  <body>
    <header class="page-header">
      <p class="eyebrow">RalphTerm</p>
      <h1>RalphTerm Dashboard</h1>
      <p class="lede">Monitor orchestration runs and interactive sessions.</p>
    </header>

    <main class="dashboard-grid">
      <section class="panel run-form-panel" aria-labelledby="run-form-title">
        <div class="panel-heading">
          <h2 id="run-form-title">Start reviewed plan run</h2>
          <span id="run-form-status" class="status" aria-live="polite"></span>
        </div>
        <form id="run-form" class="run-form">
          <label>
            Plan path
            <input id="run-plan-path" name="plan_path" type="text" placeholder="plans/task.md" required />
          </label>
          <label>
            Workspace id
            <input id="run-workspace-id" name="workspace_id" type="text" placeholder="docs-slice" />
          </label>
          <label>
            Agent
            <select id="run-agent" name="agent">
              <option value="">Custom command</option>
              <option value="claude">claude</option>
              <option value="codex">codex</option>
            </select>
          </label>
          <label>
            Agent command
            <input id="run-agent-command" name="agent_command" type="text" />
          </label>
          <label>
            Review agent
            <select id="run-review-agent" name="review_agent">
              <option value="">Custom command</option>
              <option value="claude">claude</option>
              <option value="codex" selected>codex</option>
            </select>
          </label>
          <label>
            Review command
            <input id="run-review-command" name="review_command" type="text" />
          </label>
          <label>
            Review retries
            <input id="run-max-review-retries" name="max_review_retries" type="number" min="0" value="1" />
          </label>
          <label>
            Agent timeout (ms)
            <input id="run-agent-timeout-ms" name="agent_timeout_ms" type="number" min="1" placeholder="1800000" />
          </label>
          <label class="checkbox-label">
            <input id="run-require-review" name="require_review" type="checkbox" checked />
            Require review
          </label>
          <label class="checkbox-label">
            <input id="run-dry-run" name="dry_run" type="checkbox" checked />
            Dry run
          </label>
          <label class="checkbox-label">
            <input id="run-no-commit" name="no_commit" type="checkbox" />
            No commit
          </label>
          <button id="run-submit" type="submit">Start run</button>
        </form>
      </section>

      <section class="panel" aria-labelledby="runs-title">
        <div class="panel-heading">
          <h2 id="runs-title">Runs</h2>
          <span id="runs-status" class="status" aria-live="polite">Loading…</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">ID</th>
                <th scope="col">Phase</th>
                <th scope="col">Status</th>
                <th scope="col">Gate</th>
                <th scope="col">Plan</th>
                <th scope="col">Workspace</th>
                <th scope="col">Artifacts</th>
              </tr>
            </thead>
            <tbody id="runs-body">
              <tr><td colspan="7">Loading runs…</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="panel" aria-labelledby="sessions-title">
        <div class="panel-heading">
          <h2 id="sessions-title">Sessions</h2>
          <span id="sessions-status" class="status" aria-live="polite">Loading…</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">ID</th>
                <th scope="col">Agent</th>
                <th scope="col">Status</th>
                <th scope="col">Signal</th>
                <th scope="col">Approval</th>
              </tr>
            </thead>
            <tbody id="sessions-body">
              <tr><td colspan="5">Loading sessions…</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/dashboard/app.js"></script>
  </body>
</html>
